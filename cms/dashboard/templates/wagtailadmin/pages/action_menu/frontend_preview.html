{% load wagtailadmin_tags %}
{% if url %}
    <a id="preview-btn" class="button{% if classname %} {{ classname }}{% endif %}" data-url="{{ url }}" href="{{ url }}" target="_blank" rel="noopener noreferrer">{% if icon_name %}{% icon name=icon_name %}{% endif %}{{ label }}</a>
    {% if label != "View Live" %}
    <button id="embargo-time-btn-preview" type="button" class="button button-secondary" style="margin-left: 0.5em;" title="No embargo time set">Time Travel (<span id="embargo-time-btn-label">now</span>)</button>
    <button type="button" class="button button-secondary embargo-time-set-now-btn" style="margin-left: 0.5em;" title="Reset embargo time to now">Set to Now</button>
    {% endif %}
{% else %}
    <button id="preview-btn" type="submit" name="{{ name }}" value="{{ label }}" class="button{% if classname %} {{ classname }}{% endif %}">{% if icon_name %}{% icon name=icon_name %}{% endif %}{{ label }}</button>
    {% if label != "View Live" %}
    <button id="embargo-time-btn-preview" type="button" class="button button-secondary" style="margin-left: 0.5em;" title="No embargo time set">Time Travel (<span id="embargo-time-btn-label">now</span>)</button>
    <button type="button" class="button button-secondary embargo-time-set-now-btn" style="margin-left: 0.5em;" title="Reset embargo time to now">Set to Now</button>
    {% endif %}
{% endif %}
